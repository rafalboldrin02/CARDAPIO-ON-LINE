<!DOCTYPE html>
<html>
<head>
  <title>Cardápio Pro</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    header {
      background: #1f1f1f;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .btn {
      padding: 10px;
      border-radius: 8px;
      background: #ff9800;
      border: none;
      cursor: pointer;
      color: white;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1f1f1f;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #comprador, #admin {
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h2>🍔 Cardápio</h2>
  <button class="btn" onclick="voltarInicio()">Início</button>
</header>

<div class="container" id="inicio">
  <button class="btn" onclick="abrirComprador()">Comprador</button>
  <button class="btn" onclick="loginAdmin()">Admin</button>
</div>

<div id="comprador" class="container">
  <h3>Cardápio</h3>
  <div id="menu"></div>

  <div class="card">
    <h3>🛒 Carrinho</h3>
    <ul id="carrinhoLista"></ul>
    <p>Total: R$ <span id="total">0</span></p>

    <input id="nomeCliente" placeholder="Seu nome">
    <br><br>
    <button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
  </div>
</div>

<div id="admin" class="container">
  <h3>Painel Admin</h3>

  <div class="card">
    <input id="nomeItem" placeholder="Nome">
    <input id="precoItem" placeholder="Preço">
    <button class="btn" onclick="addItem()">Postar</button>
  </div>

  <div class="card">
    <h3>Itens</h3>
    <ul id="listaItens"></ul>
  </div>

  <div class="card">
    <h3>Pedidos</h3>
    <div id="pedidos"></div>
  </div>
</div>

<!-- 🔊 SOM -->
<audio id="somPedido">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBAOc1VyUxB2oVSMV5KC96VHgtdZ_dGBRI",
  authDomain: "cardapio-app-b99f5.firebaseapp.com",
  projectId: "cardapio-app-b99f5",
  storageBucket: "cardapio-app-b99f5.appspot.com",
  messagingSenderId: "737356348366",
  appId: "1:737356348366:web:e4e4983e198139f9bd499f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];
let ultimoTotalPedidos = 0;

/* TELAS */
function voltarInicio(){
  inicio.style.display = "block";
  comprador.style.display = "none";
  admin.style.display = "none";
}

function abrirComprador(){
  inicio.style.display = "none";
  comprador.style.display = "block";
  carregarMenu();
}

function loginAdmin(){
  let senha = prompt("Senha:");
  if(senha === "admin123"){
    inicio.style.display = "none";
    admin.style.display = "block";
    carregarPedidos();
    carregarItens();
  }
}

/* ITENS */
function addItem(){
  let nome = nomeItem.value;
  let preco = parseFloat(precoItem.value);

  if(nome && preco){
    db.collection("itens").add({nome, preco});
  }
}

function carregarItens(){
  db.collection("itens").onSnapshot(snapshot => {
    listaItens.innerHTML = "";

    snapshot.forEach(doc => {
      let item = doc.data();

      listaItens.innerHTML += `
        <li>
          ${item.nome} - R$ ${item.preco}
          <button onclick="excluirItem('${doc.id}')">❌</button>
        </li>
      `;
    });
  });
}

function excluirItem(id){
  db.collection("itens").doc(id).delete();
}

/* MENU (CORRIGIDO) */
function carregarMenu(){
  db.collection("itens").onSnapshot(snapshot => {
    document.getElementById("menu").innerHTML = "";

    snapshot.forEach(doc => {
      let item = doc.data();

      document.getElementById("menu").innerHTML += `
        <div class="card menu-item">
          <span>${item.nome}</span>
          <span>R$ ${item.preco}</span>
          <button class="btn" onclick="addCarrinho('${item.nome}', ${item.preco})">+</button>
        </div>
      `;
    });
  });
}

/* CARRINHO */
function addCarrinho(nome, preco){
  carrinho.push({nome, preco});
  atualizarCarrinho();
}

function atualizarCarrinho(){
  carrinhoLista.innerHTML = "";
  let total = 0;

  carrinho.forEach(item => {
    total += item.preco;
    carrinhoLista.innerHTML += `<li>${item.nome} - R$ ${item.preco}</li>`;
  });

  totalSpan = document.getElementById("total");
  totalSpan.innerText = total.toFixed(2);
}

/* PEDIDO */
async function enviarPedido(){
  let nome = nomeCliente.value;
  if(!nome) return alert("Digite seu nome");

  let total = carrinho.reduce((s,i)=>s+i.preco,0);

  let snap = await db.collection("pedidos").get();
  let numero = String(snap.size + 1).padStart(3,'0');

  await db.collection("pedidos").add({
    numero, nome, carrinho, total
  });

  alert("Pedido enviado!");
  carrinho = [];
  atualizarCarrinho();
}

/* ADMIN */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snapshot => {

    if(snapshot.size > ultimoTotalPedidos){
      document.getElementById("somPedido").play(); // 🔊 som
      alert("Novo pedido!");
    }
    ultimoTotalPedidos = snapshot.size;

    pedidos.innerHTML = "";

    snapshot.forEach(doc => {
      let p = doc.data();

      let lista = "";
      p.carrinho.forEach(i=>{
        lista += `<li>${i.nome} - R$ ${i.preco}</li>`;
      });

      pedidos.innerHTML += `
        <div class="card">
          <h3>#${p.numero} - ${p.nome}</h3>
          <ul>${lista}</ul>
          <b>Total: R$ ${p.total}</b>
          <br><br>
          <button class="btn" onclick="entregar('${doc.id}')">Entregue</button>
        </div>
      `;
    });
  });
}

function entregar(id){
  db.collection("pedidos").doc(id).delete();
}
</script>

</body>
</html>
