<!DOCTYPE html>
<html>
<head>
  <title>Cardápio Digital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- QR Code PIX -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f0f0f;
      color:white;
    }

    header {
      padding:15px;
      text-align:center;
      background:#1f1f1f;
      font-size:20px;
    }

    .container {
      padding:10px;
    }

    .card {
      background:#1f1f1f;
      margin:10px 0;
      padding:10px;
      border-radius:10px;
    }

    .img {
      width:100%;
      border-radius:10px;
    }

    .btn {
      width:100%;
      padding:12px;
      margin-top:5px;
      border:none;
      border-radius:8px;
      background:#ff9800;
      color:white;
      font-size:16px;
    }

    #admin, #comprador, #finalizar {
      display:none;
    }

    #qrcode {
      margin-top:10px;
      text-align:center;
    }

    #versao {
      position:fixed;
      bottom:5px;
      width:100%;
      text-align:center;
      font-size:12px;
      color:#aaa;
    }
  </style>
</head>

<body>

<header id="nomeRestaurante">🍔 SEU RESTAURANTE</header>

<div class="container" id="inicio">
  <button class="btn" onclick="abrirComprador()">Ver Cardápio</button>
  <button class="btn" onclick="loginAdmin()">Admin</button>
</div>

<div id="comprador" class="container">
  <div id="menu"></div>

  <div class="card">
    <h3>🛒 Carrinho</h3>
    <ul id="carrinhoLista"></ul>
    <b>Total: R$ <span id="total">0</span></b>

    <input id="mesa" placeholder="Mesa (ex: 5)">
    <button class="btn" onclick="irFinalizar()">Finalizar</button>
  </div>

  <button class="btn" onclick="abrirBatatais()">🍔 Batatais Food</button>
</div>

<div id="finalizar" class="container">
  <div class="card">
    <h3>Resumo</h3>
    <ul id="resumo"></ul>
    <b>Total: R$ <span id="totalFinal"></span></b>

    <h3>💳 Pagar com Pix</h3>
    <canvas id="qrcode"></canvas>

    <button class="btn" onclick="enviarPedido()">Confirmar Pedido</button>
  </div>
</div>

<div id="admin" class="container">
  <div class="card">
    <input id="nomeItem" placeholder="Nome">
    <input id="precoItem" placeholder="Preço">
    <input id="imgItem" placeholder="URL da imagem">
    <button class="btn" onclick="addItem()">Adicionar</button>
  </div>

  <div id="pedidos"></div>
</div>

<div id="versao">Versão 2.0.0</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];

/* TELAS */
function abrirComprador(){
  inicio.style.display="none";
  comprador.style.display="block";
  carregarMenu();
}

function loginAdmin(){
  let s = prompt("Senha:");
  if(s==="admin123"){
    inicio.style.display="none";
    admin.style.display="block";
    carregarPedidos();
  }
}

/* MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snap=>{
    menu.innerHTML="";
    snap.forEach(doc=>{
      let i=doc.data();

      menu.innerHTML+=`
        <div class="card">
          <img src="${i.img}" class="img">
          <h3>${i.nome}</h3>
          <p>R$ ${i.preco}</p>
          <button class="btn" onclick="addCarrinho('${i.nome}',${i.preco})">Adicionar</button>
        </div>`;
    });
  });
}

/* CARRINHO */
function addCarrinho(nome,preco){
  carrinho.push({nome,preco});
  atualizar();
}

function atualizar(){
  carrinhoLista.innerHTML="";
  let total=0;

  carrinho.forEach(i=>{
    total+=i.preco;
    carrinhoLista.innerHTML+=`<li>${i.nome} - R$ ${i.preco}</li>`;
  });

  totalSpan.innerText=total.toFixed(2);
}

/* FINALIZAR */
function irFinalizar(){
  comprador.style.display="none";
  finalizar.style.display="block";

  let total=0;
  resumo.innerHTML="";

  carrinho.forEach(i=>{
    total+=i.preco;
    resumo.innerHTML+=`<li>${i.nome} - R$ ${i.preco}</li>`;
  });

  totalFinal.innerText=total.toFixed(2);

  // PIX QR (simples)
  QRCode.toCanvas(document.getElementById('qrcode'), "PIX_DO_CLIENTE");
}

/* PEDIDO */
async function enviarPedido(){
  let mesa=document.getElementById("mesa").value;
  let total=carrinho.reduce((s,i)=>s+i.preco,0);

  let snap=await db.collection("pedidos").get();
  let numero=String(snap.size+1).padStart(3,'0');

  await db.collection("pedidos").add({
    numero,mesa,carrinho,total
  });

  alert("Pedido enviado!");
  carrinho=[];
}

/* ADMIN */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snap=>{
    pedidos.innerHTML="";

    snap.forEach(doc=>{
      let p=doc.data();

      let lista="";
      p.carrinho.forEach(i=>{
        lista+=`<li>${i.nome}</li>`;
      });

      pedidos.innerHTML+=`
        <div class="card">
          <b>#${p.numero} - Mesa ${p.mesa}</b>
          <ul>${lista}</ul>
          Total: R$ ${p.total}
          <button class="btn" onclick="entregar('${doc.id}')">Entregue</button>
        </div>`;
    });
  });
}

function entregar(id){
  db.collection("pedidos").doc(id).delete();
}

/* ADMIN ADD */
function addItem(){
  db.collection("itens").add({
    nome:nomeItem.value,
    preco:parseFloat(precoItem.value),
    img:imgItem.value
  });
}

/* BOTÃO EXTERNO */
function abrirBatatais(){
  window.open("https://google.com");
}
</script>

</body>
</html>
