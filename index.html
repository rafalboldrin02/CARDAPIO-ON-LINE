<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cardápio Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#1a1a1a;
}

.icon{
  font-size:20px;
  cursor:pointer;
}

/* MENU */
.container{
  padding:10px;
}

.card{
  background:#1f1f1f;
  border-radius:15px;
  margin:10px 0;
  overflow:hidden;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff9800;
  color:white;
  margin-top:5px;
}

/* CARRINHO */
#carrinhoBox{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#111;
  transition:0.3s;
  padding:10px;
  z-index:10;
}

/* SIDEBAR */
#menuLateral{
  position:fixed;
  top:0;
  left:-100%;
  width:70%;
  height:100%;
  background:#111;
  transition:0.3s;
  padding:15px;
  z-index:10;
}

/* ADMIN */
#admin{
  display:none;
}

/* PEDIDOS */
.pedido{
  background:#1f1f1f;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<header>
  <span class="icon" onclick="abrirMenu()">☰</span>
  <h3 id="nomeRestaurante">Seu Restaurante</h3>
  <span class="icon" onclick="abrirCarrinho()">🛒</span>
</header>

<div class="container" id="menu"></div>

<!-- CARRINHO -->
<div id="carrinhoBox">
  <h3>Carrinho</h3>
  <ul id="listaCarrinho"></ul>
  <b>Total: R$ <span id="total">0</span></b>

  <input id="mesa" placeholder="Mesa">
  <button class="btn" onclick="finalizar()">Finalizar</button>
</div>

<!-- MENU LATERAL -->
<div id="menuLateral">
  <h3>Opções</h3>
  <button class="btn" onclick="loginAdmin()">Admin</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h3>Painel Cozinha</h3>

  <div>
    <input id="nomeItem" placeholder="Nome">
    <input id="precoItem" placeholder="Preço">
    <input id="imgItem" placeholder="Imagem (URL)">
    <button class="btn" onclick="addItem()">Adicionar</button>
  </div>

  <div id="pedidos"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho=[];

/* MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snap=>{
    menu.innerHTML="";
    snap.forEach(doc=>{
      let i=doc.data();

      let img = i.img || "https://source.unsplash.com/400x300/?food";

      menu.innerHTML+=`
        <div class="card">
          <img src="${img}">
          <div class="card-content">
            <h3>${i.nome}</h3>
            <p>R$ ${i.preco}</p>
            <button class="btn" onclick="addCarrinho('${i.nome}',${i.preco})">Adicionar</button>
          </div>
        </div>
      `;
    });
  });
}

/* CARRINHO */
function abrirCarrinho(){
  carrinhoBox.style.right="0";
}

function addCarrinho(nome,preco){
  carrinho.push({nome,preco});
  atualizarCarrinho();
}

function atualizarCarrinho(){
  listaCarrinho.innerHTML="";
  let total=0;

  carrinho.forEach(i=>{
    total+=i.preco;
    listaCarrinho.innerHTML+=`<li>${i.nome} - R$ ${i.preco}</li>`;
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

/* FINALIZAR */
async function finalizar(){
  let mesa=mesa.value;
  let total=carrinho.reduce((s,i)=>s+i.preco,0);

  let snap=await db.collection("pedidos").get();
  let numero=String(snap.size+1).padStart(3,'0');

  await db.collection("pedidos").add({
    numero,mesa,carrinho,total
  });

  alert("Pedido enviado!");
  carrinho=[];
  atualizarCarrinho();
}

/* MENU LATERAL */
function abrirMenu(){
  menuLateral.style.left="0";
}

/* ADMIN */
function loginAdmin(){
  let s=prompt("Senha:");
  if(s==="admin123"){
    admin.style.display="block";
    carregarPedidos();
  }
}

/* PEDIDOS (COZINHA) */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snap=>{
    pedidos.innerHTML="";

    snap.forEach(doc=>{
      let p=doc.data();

      let lista="";
      p.carrinho.forEach(i=>{
        lista+=`<li>${i.nome}</li>`;
      });

      pedidos.innerHTML+=`
        <div class="pedido">
          <b>#${p.numero} - Mesa ${p.mesa}</b>
          <ul>${lista}</ul>
          <b>R$ ${p.total}</b>
          <button class="btn" onclick="entregar('${doc.id}')">Entregue</button>
        </div>
      `;
    });
  });
}

function entregar(id){
  db.collection("pedidos").doc(id).delete();
}

/* ADD ITEM */
function addItem(){
  db.collection("itens").add({
    nome:nomeItem.value,
    preco:parseFloat(precoItem.value),
    img:imgItem.value
  });
}

carregarMenu();
</script>

</body>
</html>
