
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cardápio Pro</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f7f7f7;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* ICON */
.icon{
  font-size:22px;
  cursor:pointer;
}

/* MENU */
#menu{
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#333;
  color:white;
}

/* CARRINHO */
#carrinhoBox{
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  height:100%;
  background:white;
  transition:0.3s;
  padding:15px;
  z-index:100;
}

.close{
  font-size:20px;
  cursor:pointer;
}

/* MENU LATERAL */
#menuLateral{
  position:fixed;
  left:-100%;
  top:0;
  width:70%;
  height:100%;
  background:white;
  transition:0.3s;
  padding:15px;
  z-index:100;
}

/* ADMIN */
#admin{
  display:none;
  padding:10px;
  background:#f0f0f0;
}

/* PEDIDOS */
.pedido{
  background:white;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<header>
  <span class="icon" onclick="abrirMenu()">☰</span>
  <h3>Cardápio</h3>
  <span class="icon" onclick="abrirCarrinho()">🛒</span>
</header>

<div id="menu"></div>

<!-- CARRINHO -->
<div id="carrinhoBox">
  <span class="close" onclick="fecharCarrinho()">✖</span>

  <h3>Carrinho</h3>
  <ul id="listaCarrinho"></ul>

  <b>Total: R$ <span id="total">0</span></b>

  <input id="mesa" placeholder="Mesa" style="width:100%;padding:10px;margin-top:10px;">
  <button class="btn" onclick="finalizar()">Finalizar</button>
</div>

<!-- MENU -->
<div id="menuLateral">
  <span class="close" onclick="fecharMenu()">✖</span>

  <h3>Opções</h3>
  <button class="btn" onclick="loginAdmin()">Admin</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h2>Painel Cozinha</h2>

  <div class="card">
    <div class="card-content">
      <input id="nomeItem" placeholder="Nome"><br><br>
      <input id="precoItem" placeholder="Preço"><br><br>
      <input id="imgItem" placeholder="Imagem (opcional)"><br><br>
      <button class="btn" onclick="addItem()">Adicionar Item</button>
    </div>
  </div>

  <h3>Pedidos</h3>
  <div id="pedidos"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* VAR */
let carrinhoLista = [];

/* MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snap=>{
    document.getElementById("menu").innerHTML="";

    snap.forEach(doc=>{
      let i=doc.data();
      let img=i.img || "https://source.unsplash.com/400x300/?food";

      document.getElementById("menu").innerHTML+=`
        <div class="card">
          <img src="${img}">
          <div class="card-content">
            <h3>${i.nome}</h3>
            <p>R$ ${i.preco}</p>
            <button class="btn" onclick="addCarrinho('${i.nome}',${i.preco})">Adicionar</button>
          </div>
        </div>`;
    });
  });
}

/* CARRINHO */
function abrirCarrinho(){
  document.getElementById("carrinhoBox").style.right="0";
}

function fecharCarrinho(){
  document.getElementById("carrinhoBox").style.right="-100%";
}

function addCarrinho(nome,preco){
  carrinhoLista.push({nome,preco});
  atualizarCarrinho();
}

function atualizarCarrinho(){
  let lista = document.getElementById("listaCarrinho");
  lista.innerHTML="";
  let total=0;

  carrinhoLista.forEach(i=>{
    total+=i.preco;
    lista.innerHTML+=`<li>${i.nome} - R$ ${i.preco}</li>`;
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

/* FINALIZAR */
async function finalizar(){
  let mesa=document.getElementById("mesa").value;
  let total=carrinhoLista.reduce((s,i)=>s+i.preco,0);

  let snap=await db.collection("pedidos").get();
  let numero=String(snap.size+1).padStart(3,'0');

  await db.collection("pedidos").add({
    numero,mesa,carrinho:carrinhoLista,total
  });

  alert("Pedido enviado!");
  carrinhoLista=[];
  atualizarCarrinho();
  fecharCarrinho();
}

/* MENU */
function abrirMenu(){
  document.getElementById("menuLateral").style.left="0";
}

function fecharMenu(){
  document.getElementById("menuLateral").style.left="-100%";
}

/* ADMIN */
function loginAdmin(){
  let senha=prompt("Senha:");
  if(senha==="admin123"){
    document.getElementById("admin").style.display="block";
    carregarPedidos();
  }
}

/* PEDIDOS */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snap=>{
    document.getElementById("pedidos").innerHTML="";

    snap.forEach(doc=>{
      let p=doc.data();

      let lista="";
      p.carrinho.forEach(i=>{
        lista+=`<li>${i.nome}</li>`;
      });

      document.getElementById("pedidos").innerHTML+=`
        <div class="pedido">
          <b>#${p.numero} - Mesa ${p.mesa}</b>
          <ul>${lista}</ul>
          <b>Total: R$ ${p.total}</b>
          <button class="btn" onclick="entregar('${doc.id}')">Entregue</button>
        </div>`;
    });
  });
}

function entregar(id){
  db.collection("pedidos").doc(id).delete();
}

/* ADD ITEM */
function addItem(){
  db.collection("itens").add({
    nome:document.getElementById("nomeItem").value,
    preco:parseFloat(document.getElementById("precoItem").value),
    img:document.getElementById("imgItem").value
  });
}

carregarMenu();
</script>

</body>
</html>
