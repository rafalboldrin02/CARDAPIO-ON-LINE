<!DOCTYPE html>
<html>
<head>
  <title>Cardápio</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .inicio {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 100px;
    }

    .box {
      width: 200px;
      height: 200px;
      background: #222;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
    }

    #comprador, #admin {
      display: none;
      padding: 20px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      background: #222;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .carrinho-box {
      background: #222;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🍔 Cardápio Online</h1>

<div class="inicio" id="inicio">
  <div class="box" onclick="abrirComprador()">Comprador</div>
  <div class="box" onclick="loginAdmin()">Admin</div>
</div>

<!-- COMPRADOR -->
<div id="comprador">
  <h2>Cardápio</h2>
  <div id="menu"></div>

  <div class="carrinho-box">
    <h3>🛒 Carrinho</h3>
    <ul id="carrinhoLista"></ul>
    <p><b>Total: R$ <span id="total">0</span></b></p>

    <input id="nomeCliente" placeholder="Seu nome">
    <br><br>
    <button onclick="enviarPedido()">Enviar Pedido</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <h2>Painel Admin</h2>

  <input id="nomeItem" placeholder="Nome">
  <input id="precoItem" placeholder="Preço">
  <button onclick="addItem()">Postar</button>

  <h3>Itens</h3>
  <ul id="listaItens"></ul>

  <h3>Pedidos</h3>
  <div id="pedidos"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBAOc1VyUxB2oVSMV5KC96VHgtdZ_dGBRI",
  authDomain: "cardapio-app-b99f5.firebaseapp.com",
  projectId: "cardapio-app-b99f5",
  storageBucket: "cardapio-app-b99f5.appspot.com",
  messagingSenderId: "737356348366",
  appId: "1:737356348366:web:e4e4983e198139f9bd499f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];

/* TELAS */
function abrirComprador(){
  inicio.style.display = "none";
  comprador.style.display = "block";
  carregarMenu();
}

function loginAdmin(){
  let senha = prompt("Senha:");
  if(senha === "admin123"){
    inicio.style.display = "none";
    admin.style.display = "block";
    carregarPedidos();
    carregarItens();
  }
}

/* ITENS */
function addItem(){
  let nome = nomeItem.value;
  let preco = parseFloat(precoItem.value);

  if(nome && preco){
    db.collection("itens").add({nome, preco});
  }
}

function carregarItens(){
  db.collection("itens").onSnapshot(snapshot => {
    listaItens.innerHTML = "";

    snapshot.forEach(doc => {
      let item = doc.data();
      listaItens.innerHTML += `
        <li>
          ${item.nome} - R$ ${item.preco}
          <button onclick="excluirItem('${doc.id}')">❌</button>
        </li>
      `;
    });
  });
}

function excluirItem(id){
  db.collection("itens").doc(id).delete();
}

/* MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snapshot => {
    menu.innerHTML = "";

    snapshot.forEach(doc => {
      let item = doc.data();

      menu.innerHTML += `
        <div class="menu-item">
          <span>${item.nome}</span>
          <span>R$ ${item.preco}</span>
          <button onclick="addCarrinho('${item.nome}', ${item.preco})">+</button>
        </div>
      `;
    });
  });
}

/* CARRINHO */
function addCarrinho(nome, preco){
  carrinho.push({nome, preco});
  atualizarCarrinho();
}

function atualizarCarrinho(){
  carrinhoLista.innerHTML = "";
  let total = 0;

  carrinho.forEach(item => {
    total += item.preco;
    carrinhoLista.innerHTML += `<li>${item.nome} - R$ ${item.preco}</li>`;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

/* PEDIDO */
function enviarPedido(){
  let nome = nomeCliente.value;

  if(!nome){
    alert("Digite seu nome!");
    return;
  }

  let total = carrinho.reduce((s, i) => s + i.preco, 0);

  db.collection("pedidos").add({
    nome,
    carrinho,
    total
  });

  alert("Pedido enviado!");
  carrinho = [];
  atualizarCarrinho();
}

/* ADMIN PEDIDOS */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snapshot => {
    pedidos.innerHTML = "";

    snapshot.forEach(doc => {
      let p = doc.data();

      let lista = "";
      p.carrinho.forEach(item => {
        lista += `<li>${item.nome} - R$ ${item.preco}</li>`;
      });

      pedidos.innerHTML += `
        <div style="background:#222; padding:10px; margin:10px; border-radius:10px;">
          <h3>${p.nome}</h3>
          <ul>${lista}</ul>
          <b>Total: R$ ${p.total}</b>
        </div>
      `;
    });
  });
}
</script>

</body>
</html>
