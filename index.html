<!DOCTYPE html>
<html>
<head>
  <title>Cardápio</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>

<body>

<h1>🍔 Cardápio Online</h1>

<button onclick="loginAdmin()">Admin</button>
<button onclick="abrirComprador()">Comprador</button>

<ul id="menu"></ul>

<input id="nomeCliente" placeholder="Seu nome">
<button onclick="enviarPedido()">Enviar Pedido</button>

<hr>

<div id="admin" style="display:none;">
  <h2>Painel Admin</h2>

  <input id="nomeItem" placeholder="Nome">
  <input id="precoItem" placeholder="Preço">
  <button onclick="addItem()">Adicionar</button>

  <h3>Pedidos:</h3>
  <ul id="pedidos"></ul>
</div>

<script>
const firebaseConfig = {
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBAOc1VyUxB2oVSMV5KC96VHgtdZ_dGBRI",
  authDomain: "cardapio-app-b99f5.firebaseapp.com",
  projectId: "cardapio-app-b99f5",
  storageBucket: "cardapio-app-b99f5.firebasestorage.app",
  messagingSenderId: "737356348366",
  appId: "1:737356348366:web:e4e4983e198139f9bd499f"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];

function abrirComprador(){
  carregarMenu();
}

function loginAdmin(){
  let senha = prompt("Senha:");
  if(senha === "admin123"){
    document.getElementById("admin").style.display = "block";
    carregarPedidos();
  }
}

function addItem(){
  let nome = nomeItem.value;
  let preco = precoItem.value;

  db.collection("itens").add({nome, preco});
}

function carregarMenu(){
  db.collection("itens").onSnapshot(snapshot => {
    menu.innerHTML = "";
    snapshot.forEach(doc => {
      let item = doc.data();
      menu.innerHTML += `
        <li>${item.nome} - R$ ${item.preco}
        <button onclick="addCarrinho('${item.nome}', ${item.preco})">+</button>
        </li>`;
    });
  });
}

function addCarrinho(nome, preco){
  carrinho.push({nome, preco});
}

function enviarPedido(){
  let nome = nomeCliente.value;

  db.collection("pedidos").add({
    nome,
    carrinho
  });

  alert("Pedido enviado!");
  carrinho = [];
}

function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snapshot => {
    pedidos.innerHTML = "";
    snapshot.forEach(doc => {
      let p = doc.data();
      pedidos.innerHTML += `<li>${p.nome} - ${JSON.stringify(p.carrinho)}</li>`;
    });
  });
}
</script>

</body>
</html>
