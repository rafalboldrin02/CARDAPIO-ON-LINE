<!DOCTYPE html>
<html>
<head>
  <title>Cardápio App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    header {
      padding: 15px;
      background: #1f1f1f;
      text-align: center;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 5px 0;
      border: none;
      border-radius: 10px;
      background: #ff9800;
      color: white;
      font-size: 16px;
    }

    .card {
      background: #1f1f1f;
      padding: 15px;
      margin: 10px;
      border-radius: 12px;
    }

    #comprador, #admin {
      display: none;
    }

    #versao {
      position: fixed;
      bottom: 5px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #aaa;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h2>🍔 Cardápio App</h2>
</header>

<div id="inicio" class="card">
  <button class="btn" onclick="ativarSom()">🔊 Ativar Som</button>
  <button class="btn" onclick="abrirComprador()">Comprador</button>
  <button class="btn" onclick="loginAdmin()">Admin</button>
</div>

<div id="comprador">
  <div id="menu"></div>

  <div class="card">
    <h3>Carrinho</h3>
    <ul id="carrinhoLista"></ul>
    <p>Total: R$ <span id="total">0</span></p>

    <input id="nomeCliente" placeholder="Seu nome">
    <button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
  </div>
</div>

<div id="admin">
  <div class="card">
    <input id="nomeItem" placeholder="Nome">
    <input id="precoItem" placeholder="Preço">
    <button class="btn" onclick="addItem()">Postar</button>
  </div>

  <div class="card">
    <h3>Pedidos</h3>
    <div id="pedidos"></div>
  </div>
</div>

<!-- SOM -->
<audio id="som">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-alert-quick-chime-766.mp3">
</audio>

<div id="versao">Versão 1.0.0</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBAOc1VyUxB2oVSMV5KC96VHgtdZ_dGBRI",
  authDomain: "cardapio-app-b99f5.firebaseapp.com",
  projectId: "cardapio-app-b99f5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];
let somAtivo = false;
let ultimo = 0;

/* SOM */
function ativarSom(){
  som.play();
  som.pause();
  som.currentTime = 0;
  somAtivo = true;
  alert("Som ativado!");
}

/* TELAS */
function abrirComprador(){
  inicio.style.display="none";
  comprador.style.display="block";
  carregarMenu();
}

function loginAdmin(){
  let s = prompt("Senha:");
  if(s==="admin123"){
    inicio.style.display="none";
    admin.style.display="block";
    carregarPedidos();
  }
}

/* MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snap=>{
    menu.innerHTML="";
    snap.forEach(doc=>{
      let i = doc.data();
      menu.innerHTML += `
        <div class="card">
          ${i.nome} - R$ ${i.preco}
          <button class="btn" onclick="addCarrinho('${i.nome}',${i.preco})">+</button>
        </div>`;
    });
  });
}

/* CARRINHO */
function addCarrinho(nome,preco){
  carrinho.push({nome,preco});
  atualizar();
}

function atualizar(){
  carrinhoLista.innerHTML="";
  let total=0;
  carrinho.forEach(i=>{
    total+=i.preco;
    carrinhoLista.innerHTML+=\`<li>\${i.nome} - R$ \${i.preco}</li>\`;
  });
  totalSpan.innerText=total.toFixed(2);
}

/* PEDIDO */
async function enviarPedido(){
  let nome=nomeCliente.value;
  if(!nome) return alert("Digite seu nome");

  let total=carrinho.reduce((s,i)=>s+i.preco,0);

  let snap=await db.collection("pedidos").get();
  let numero=String(snap.size+1).padStart(3,'0');

  await db.collection("pedidos").add({numero,nome,carrinho,total});

  carrinho=[];
  atualizar();
  alert("Enviado!");
}

/* ADMIN */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snap=>{

    if(snap.size>ultimo){
      if(somAtivo){
        som.play();
        navigator.vibrate?.(200);
      }
      alert("Novo pedido!");
    }
    ultimo=snap.size;

    pedidos.innerHTML="";
    snap.forEach(doc=>{
      let p=doc.data();

      let lista="";
      p.carrinho.forEach(i=>{
        lista+=\`<li>\${i.nome} - R$ \${i.preco}</li>\`;
      });

      pedidos.innerHTML+=`
        <div class="card">
          <b>#${p.numero} - ${p.nome}</b>
          <ul>${lista}</ul>
          Total: R$ ${p.total}
          <button class="btn" onclick="entregar('${doc.id}')">Entregue</button>
        </div>`;
    });
  });
}

function entregar(id){
  db.collection("pedidos").doc(id).delete();
}

function addItem(){
  db.collection("itens").add({
    nome:nomeItem.value,
    preco:parseFloat(precoItem.value)
  });
}
</script>

</body>
</html>
