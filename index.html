<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cardápio Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  color:#222;
  transition:0.3s;
}

.dark{
  background:#111;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:white;
}

.dark header{
  background:#1a1a1a;
}

.icon{
  cursor:pointer;
  font-size:20px;
}

.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.dark .card{
  background:#1e1e1e;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
}

#carrinho{
  position:fixed;
  right:-100%;
  top:0;
  width:80%;
  height:100%;
  background:white;
  transition:0.3s;
  padding:10px;
}

.dark #carrinho{
  background:#111;
}

#menuLateral{
  position:fixed;
  left:-100%;
  top:0;
  width:70%;
  height:100%;
  background:white;
  transition:0.3s;
  padding:10px;
}

.dark #menuLateral{
  background:#111;
}

#admin{
  display:none;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <span class="icon" onclick="abrirMenu()">☰</span>
  <h3>Cardápio</h3>
  <span class="icon" onclick="abrirCarrinho()">🛒</span>
</header>

<div id="menu"></div>

<!-- CARRINHO -->
<div id="carrinho">
  <button onclick="fecharCarrinho()">✖</button>

  <h3>Carrinho</h3>
  <ul id="lista"></ul>
  <b>Total: R$ <span id="total">0</span></b>

  <input id="mesa" placeholder="Mesa">
  <button class="btn" onclick="finalizar()">Finalizar</button>
</div>

<!-- MENU -->
<div id="menuLateral">
  <button onclick="fecharMenu()">✖</button>

  <h3>Configurações</h3>
  <button class="btn" onclick="toggleDark()">Modo escuro</button>
  <button class="btn" onclick="loginAdmin()">Admin</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h2>Painel Cozinha</h2>

  <div class="card">
    <input id="nomeItem" placeholder="Nome"><br><br>
    <input id="precoItem" placeholder="Preço"><br><br>
    <input id="imgItem" placeholder="Imagem (opcional)"><br><br>
    <button class="btn" onclick="addItem()">Adicionar</button>
  </div>

  <div id="pedidos"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho=[];

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snap=>{
    menu.innerHTML="";

    snap.forEach(doc=>{
      let i=doc.data();
      let img = i.img || "https://source.unsplash.com/400x300/?food";

      menu.innerHTML+=`
        <div class="card">
          <img src="${img}" style="width:100%;border-radius:10px;">
          <h3>${i.nome}</h3>
          <p>R$ ${i.preco}</p>
          <button class="btn" onclick="add('${i.nome}',${i.preco})">Adicionar</button>
        </div>`;
    });
  });
}

/* CARRINHO */
function abrirCarrinho(){ carrinho.style.right="0"; }
function fecharCarrinho(){ carrinho.style.right="-100%"; }

function add(nome,preco){
  carrinho.push({nome,preco});
  atualizar();
}

function atualizar(){
  lista.innerHTML="";
  let total=0;

  carrinho.forEach(i=>{
    total+=i.preco;
    lista.innerHTML+=`<li>${i.nome}</li>`;
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

/* FINALIZAR */
async function finalizar(){
  let mesa=document.getElementById("mesa").value;
  let total=carrinho.reduce((s,i)=>s+i.preco,0);

  let snap=await db.collection("pedidos").get();
  let numero=String(snap.size+1).padStart(3,'0');

  await db.collection("pedidos").add({numero,mesa,carrinho,total});

  alert("Pedido #" + numero + " enviado!");
  carrinho=[];
  atualizar();
}

/* MENU */
function abrirMenu(){ menuLateral.style.left="0"; }
function fecharMenu(){ menuLateral.style.left="-100%"; }

/* ADMIN */
function loginAdmin(){
  let s=prompt("Senha:");
  if(s==="admin123"){
    admin.style.display="block";
    carregarPedidos();
  }
}

/* PEDIDOS */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snap=>{
    pedidos.innerHTML="";

    snap.forEach(doc=>{
      let p=doc.data();

      let lista="";
      p.carrinho.forEach(i=>{
        lista+=`<li>${i.nome}</li>`;
      });

      pedidos.innerHTML+=`
        <div class="card">
          <b>#${p.numero} - Mesa ${p.mesa}</b>
          <ul>${lista}</ul>
          <b>R$ ${p.total}</b>
          <button class="btn" onclick="entregar('${doc.id}')">Entregue</button>
        </div>`;
    });
  });
}

/* ENTREGAR */
function entregar(id){
  db.collection("pedidos").doc(id).delete();
}

/* ADD ITEM */
function addItem(){
  db.collection("itens").add({
    nome:nomeItem.value,
    preco:parseFloat(precoItem.value),
    img:imgItem.value
  });
}

carregarMenu();
</script>

</body>
</html>
