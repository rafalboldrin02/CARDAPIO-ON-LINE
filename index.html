<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cardápio Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  color:#222;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
  position:sticky;
  top:0;
}

.icon{
  font-size:22px;
  cursor:pointer;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  margin:12px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  margin-top:8px;
  font-size:15px;
}

/* CARRINHO */
#carrinhoBox{
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  height:100%;
  background:white;
  transition:0.3s;
  padding:15px;
  z-index:100;
}

/* MENU LATERAL */
#menuLateral{
  position:fixed;
  top:0;
  left:-100%;
  width:75%;
  height:100%;
  background:white;
  transition:0.3s;
  padding:15px;
  z-index:100;
}

/* ADMIN */
#admin{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  color:white;
  display:none;
  overflow:auto;
  padding:15px;
}

/* PEDIDOS */
.pedido{
  background:#222;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
}

/* FECHAR */
.fechar{
  font-size:22px;
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <span class="icon" onclick="abrirMenu()">☰</span>
  <h3>Seu Restaurante</h3>
  <span class="icon" onclick="abrirCarrinho()">🛒</span>
</header>

<div id="menu"></div>

<!-- CARRINHO -->
<div id="carrinhoBox">
  <span class="fechar" onclick="fecharCarrinho()">✖</span>
  <h3>Carrinho</h3>

  <ul id="listaCarrinho"></ul>
  <b>Total: R$ <span id="total">0</span></b>

  <input id="mesa" placeholder="Mesa" style="width:100%;padding:10px;margin-top:10px;">
  <button class="btn" onclick="finalizar()">Finalizar Pedido</button>
</div>

<!-- MENU -->
<div id="menuLateral">
  <span class="fechar" onclick="fecharMenu()">✖</span>
  <h3>Opções</h3>
  <button class="btn" onclick="loginAdmin()">Admin</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <span class="fechar" onclick="fecharAdmin()">✖</span>
  <h2>Painel Cozinha</h2>

  <div>
    <input id="nomeItem" placeholder="Nome"><br><br>
    <input id="precoItem" placeholder="Preço"><br><br>
    <input id="imgItem" placeholder="Imagem"><br><br>
    <button class="btn" onclick="addItem()">Adicionar</button>
  </div>

  <div id="pedidos"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho=[];

/* MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snap=>{
    menu.innerHTML="";
    snap.forEach(doc=>{
      let i=doc.data();
      let img=i.img || "https://source.unsplash.com/400x300/?food";

      menu.innerHTML+=`
        <div class="card">
          <img src="${img}">
          <div class="card-content">
            <h3>${i.nome}</h3>
            <p>R$ ${i.preco}</p>
            <button class="btn" onclick="addCarrinho('${i.nome}',${i.preco})">Adicionar</button>
          </div>
        </div>`;
    });
  });
}

/* CARRINHO */
function abrirCarrinho(){ carrinhoBox.style.right="0"; }
function fecharCarrinho(){ carrinhoBox.style.right="-100%"; }

function addCarrinho(nome,preco){
  carrinho.push({nome,preco});
  atualizar();
}

function atualizar(){
  listaCarrinho.innerHTML="";
  let total=0;

  carrinho.forEach(i=>{
    total+=i.preco;
    listaCarrinho.innerHTML+=`<li>${i.nome} - R$ ${i.preco}</li>`;
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

/* FINALIZAR */
async function finalizar(){
  let mesa=mesa.value;
  let total=carrinho.reduce((s,i)=>s+i.preco,0);

  let snap=await db.collection("pedidos").get();
  let numero=String(snap.size+1).padStart(3,'0');

  await db.collection("pedidos").add({numero,mesa,carrinho,total});

  alert("Pedido enviado!");
  carrinho=[];
  atualizar();
  fecharCarrinho();
}

/* MENU LATERAL */
function abrirMenu(){ menuLateral.style.left="0"; }
function fecharMenu(){ menuLateral.style.left="-100%"; }

/* ADMIN */
function loginAdmin(){
  let s=prompt("Senha:");
  if(s==="admin123"){
    admin.style.display="block";
    carregarPedidos();
  }
}

function fecharAdmin(){
  admin.style.display="none";
}

/* PEDIDOS */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snap=>{
    pedidos.innerHTML="";

    snap.forEach(doc=>{
      let p=doc.data();
      let lista="";

      p.carrinho.forEach(i=>{
        lista+=`<li>${i.nome}</li>`;
      });

      pedidos.innerHTML+=`
        <div class="pedido">
          <b>#${p.numero} - Mesa ${p.mesa}</b>
          <ul>${lista}</ul>
          <b>R$ ${p.total}</b>
          <button class="btn" onclick="entregar('${doc.id}')">Entregue</button>
        </div>`;
    });
  });
}

function entregar(id){
  db.collection("pedidos").doc(id).delete();
}

/* ADD ITEM */
function addItem(){
  db.collection("itens").add({
    nome:nomeItem.value,
    preco:parseFloat(precoItem.value),
    img:imgItem.value
  });
}

carregarMenu();
</script>

</body>
</html>
