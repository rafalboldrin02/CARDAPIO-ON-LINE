<!DOCTYPE html>
<html>
<head>
  <title>Cardápio</title>

  <!-- Firebase CORRETO (versão 8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .inicio {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 100px;
    }

    .box {
      width: 200px;
      height: 200px;
      background: #222;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.3s;
    }

    .box:hover {
      background: #444;
      transform: scale(1.1);
    }

    #comprador, #admin {
      display: none;
      padding: 20px;
    }

    .painel {
      display: flex;
      gap: 20px;
    }

    .coluna {
      width: 50%;
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🍔 Cardápio Online</h1>

<div class="inicio" id="inicio">
  <div class="box" onclick="abrirComprador()">Comprador</div>
  <div class="box" onclick="loginAdmin()">Admin</div>
</div>

<!-- COMPRADOR -->
<div id="comprador">
  <h2>Cardápio</h2>
  <ul id="menu"></ul>

  <h3>Carrinho:</h3>
  <ul id="carrinhoLista"></ul>

  <input id="nomeCliente" placeholder="Seu nome">
  <br>
  <button onclick="enviarPedido()">Enviar Pedido</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h2>Painel Admin</h2>

  <div class="painel">
    
    <div class="coluna">
      <h3>Adicionar Item</h3>
      <input id="nomeItem" placeholder="Nome">
      <input id="precoItem" placeholder="Preço">
      <button onclick="addItem()">Postar</button>
    </div>

    <div class="coluna">
      <h3>Pedidos</h3>
      <ul id="pedidos"></ul>
    </div>

  </div>
</div>

<script>
/* 🔥 CONFIG DO FIREBASE (SEU) */
const firebaseConfig = {
  apiKey: "AIzaSyBAOc1VyUxB2oVSMV5KC96VHgtdZ_dGBRI",
  authDomain: "cardapio-app-b99f5.firebaseapp.com",
  projectId: "cardapio-app-b99f5",
  storageBucket: "cardapio-app-b99f5.appspot.com",
  messagingSenderId: "737356348366",
  appId: "1:737356348366:web:e4e4983e198139f9bd499f"
};

/* 🔥 INICIALIZAÇÃO */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];

/* 🔓 COMPRADOR */
function abrirComprador(){
  document.getElementById("inicio").style.display = "none";
  document.getElementById("comprador").style.display = "block";
  carregarMenu();
}

/* 🔒 ADMIN */
function loginAdmin(){
  let senha = prompt("Senha:");
  if(senha === "admin123"){
    document.getElementById("inicio").style.display = "none";
    document.getElementById("admin").style.display = "block";
    carregarPedidos();
  } else {
    alert("Senha errada");
  }
}

/* ➕ ADD ITEM */
function addItem(){
  let nome = document.getElementById("nomeItem").value;
  let preco = document.getElementById("precoItem").value;

  if(nome && preco){
    db.collection("itens").add({nome, preco});
  }
}

/* 📋 MENU */
function carregarMenu(){
  db.collection("itens").onSnapshot(snapshot => {
    document.getElementById("menu").innerHTML = "";
    snapshot.forEach(doc => {
      let item = doc.data();
      document.getElementById("menu").innerHTML += `
        <li>${item.nome} - R$ ${item.preco}
        <button onclick="addCarrinho('${item.nome}', ${item.preco})">+</button>
        </li>`;
    });
  });
}

/* 🛒 CARRINHO */
function addCarrinho(nome, preco){
  carrinho.push({nome, preco});
  atualizarCarrinho();
}

function atualizarCarrinho(){
  let lista = document.getElementById("carrinhoLista");
  lista.innerHTML = "";

  carrinho.forEach(item => {
    lista.innerHTML += `<li>${item.nome} - R$ ${item.preco}</li>`;
  });
}

/* 📤 PEDIDO */
function enviarPedido(){
  let nome = document.getElementById("nomeCliente").value;

  if(!nome){
    alert("Digite seu nome!");
    return;
  }

  db.collection("pedidos").add({
    nome,
    carrinho
  });

  alert("Pedido enviado!");
  carrinho = [];
  atualizarCarrinho();
}

/* 📥 PEDIDOS ADMIN */
function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snapshot => {
    let lista = document.getElementById("pedidos");
    lista.innerHTML = "";

    snapshot.forEach(doc => {
      let p = doc.data();
      lista.innerHTML += `<li>${p.nome} - ${JSON.stringify(p.carrinho)}</li>`;
    });
  });
}
</script>

</body>
</html>
