<!DOCTYPE html>
<html>
<head>
  <title>Cardápio</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .inicio {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 100px;
    }

    .box {
      width: 200px;
      height: 200px;
      background: #222;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.3s;
    }

    .box:hover {
      background: #444;
      transform: scale(1.1);
    }

    #comprador, #admin {
      display: none;
      padding: 20px;
    }

    .painel {
      display: flex;
      gap: 20px;
    }

    .coluna {
      width: 50%;
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🍔 Cardápio Online</h1>

<div class="inicio" id="inicio">
  <div class="box" onclick="abrirComprador()">Comprador</div>
  <div class="box" onclick="loginAdmin()">Admin</div>
</div>

<!-- COMPRADOR -->
<div id="comprador">
  <h2>Cardápio</h2>
  <ul id="menu"></ul>

  <h3>Carrinho:</h3>
  <ul id="carrinhoLista"></ul>

  <input id="nomeCliente" placeholder="Seu nome">
  <br>
  <button onclick="enviarPedido()">Enviar Pedido</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h2>Painel Admin</h2>

  <div class="painel">
    
    <div class="coluna">
      <h3>Adicionar Item</h3>
      <input id="nomeItem" placeholder="Nome">
      <input id="precoItem" placeholder="Preço">
      <button onclick="addItem()">Postar</button>
    </div>

    <div class="coluna">
      <h3>Pedidos</h3>
      <ul id="pedidos"></ul>
    </div>

  </div>
</div>

<script>
const firebaseConfig = {
const firebaseConfig = {};
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];

function abrirComprador(){
  inicio.style.display = "none";
  comprador.style.display = "block";
  carregarMenu();
}

function loginAdmin(){
  let senha = prompt("Senha:");
  if(senha === "admin123"){
    inicio.style.display = "none";
    admin.style.display = "block";
    carregarPedidos();
  } else {
    alert("Senha errada");
  }
}

function addItem(){
  let nome = nomeItem.value;
  let preco = precoItem.value;

  if(nome && preco){
    db.collection("itens").add({nome, preco});
  }
}

function carregarMenu(){
  db.collection("itens").onSnapshot(snapshot => {
    menu.innerHTML = "";
    snapshot.forEach(doc => {
      let item = doc.data();
      menu.innerHTML += `
        <li>${item.nome} - R$ ${item.preco}
        <button onclick="addCarrinho('${item.nome}', ${item.preco})">+</button>
        </li>`;
    });
  });
}

function addCarrinho(nome, preco){
  carrinho.push({nome, preco});
  atualizarCarrinho();
}

function atualizarCarrinho(){
  carrinhoLista.innerHTML = "";
  carrinho.forEach(item => {
    carrinhoLista.innerHTML += `<li>${item.nome} - R$ ${item.preco}</li>`;
  });
}

function enviarPedido(){
  let nome = nomeCliente.value;

  if(!nome){
    alert("Digite seu nome!");
    return;
  }

  db.collection("pedidos").add({
    nome,
    carrinho
  });

  alert("Pedido enviado!");
  carrinho = [];
  atualizarCarrinho();
}

function carregarPedidos(){
  db.collection("pedidos").onSnapshot(snapshot => {
    pedidos.innerHTML = "";
    snapshot.forEach(doc => {
      let p = doc.data();
      pedidos.innerHTML += `<li>${p.nome} - ${JSON.stringify(p.carrinho)}</li>`;
    });
  });
}
</script>

</body>
</html>
